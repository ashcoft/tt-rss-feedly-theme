name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump (major/minor/patch)'
        required: false
        default: 'patch'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release PR or Publish
        uses: changesets/action@v1.9.0
        with:
          commit: "Release changes"
          title: "Release changes"
          createRelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package-lock.json
        run: |
          npm install --package-lock-only
          git add package-lock.json
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit --amend --no-edit || true
          git push --force-with-lease || true

      - name: Update Release Description
        if: success()
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$TAG" ]; then
            VERSION=${TAG#v}
            BODY="## Feedly Theme for Tiny Tiny RSS

A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

### Quick Start
1. Download this release
2. Extract to your tt-rss themes directory  
3. Activate in tt-RSS preferences

### Changes
See CHANGELOG.md for details."

            # Update release body using GitHub API
            curl -s -X PATCH "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"body\": \"$BODY\"}" || true
          fi
