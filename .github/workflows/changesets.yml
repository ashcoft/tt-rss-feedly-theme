name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Manual trigger for version bump

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release PR or Publish
        uses: changesets/action@v1.9.0
        with:
          commit: "Release changes"
          title: "Release changes"
          createRelease: true  # Auto-publish releases (not draft)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  version-bump:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Bump version
        run: npx changeset version

      - name: Create Commit and PR
        run: |
          if git diff --quiet; then
            echo "No changesets found. Create a changeset file first:"
            echo "echo '---' > .changeset/VERSION.md"
            echo 'echo \'package-name: patch\' >> .changeset/VERSION.md'
            echo 'echo \'---\' >> .changeset/VERSION.md'
            echo 'echo \'Description\' >> .changeset/VERSION.md'
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "version: bump packages"
          git tag $(node -p "require('./package.json').version")
          git push && git push --tags
