name: Changesets

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump (major/minor/patch)'
        required: false
        default: 'patch'

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release PR or Publish
        uses: changesets/action@v1.9.0
        with:
          commit: "Release changes"
          title: "Release changes"
          createRelease: true  # Auto-publish when version is bumped
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package-lock.json
        run: |
          # Regenerate package-lock.json to ensure it matches package.json
          npm install --package-lock-only
          git add package-lock.json
          git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" commit --amend --no-edit || true
          git push --force-with-lease || true
