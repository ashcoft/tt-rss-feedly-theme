name: Changesets

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  changesets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@b4f1987b072e20798b1e458b1e56f5ea751f3d37

      - name: Setup Node
        uses: actions/setup-node@0a7d64603bf2be26ff8f59ad5c48e3c987c2a4f2
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Create Release PR
        uses: changesets/action@v1
        with:
          commit: "Release changes"
          title: "Release changes"
          createRelease: "draft"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
