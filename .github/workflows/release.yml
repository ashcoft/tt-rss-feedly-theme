name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Check for changes
        id: changes
        run: |
          # Check if there are changes outside tt-rss submodule
          if git diff --name-only | grep -v "^tt-rss/" | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files=$(git diff --name-only | grep -v '^tt-rss/' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Semantic Release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Prepare Release Assets
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          mkdir -p release-assets
          
          # Copy theme files
          cp *.css release-assets/ 2>/dev/null || true
          cp -r feedly release-assets/ 2>/dev/null || true
          cp local-overrides.js release-assets/ 2>/dev/null || true
          
          # Create zip archive
          cd release-assets
          zip -r ../release.zip .
          cd ..
          
          ls -la release.zip

      - name: Upload to GitHub Release
        if: steps.changes.outputs.has_changes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.GITHUB_REF_NAME }}
          name: Release ${{ env.GITHUB_REF_NAME }}
          body: |
            ## Feedly Theme for Tiny Tiny RSS

            A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

            ### Installation
            1. Download and extract the zip
            2. Copy the contents to your tt-rss `themes/` directory
            3. Activate in tt-RSS preferences

            ### Changes
            See [CHANGELOG.md](https://github.com/ashcoft/tt-rss-feedly-theme/blob/main/CHANGELOG.md) for details.
          files: release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Has Changes | ${{ steps.changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "| Changed Files | \`${{ steps.changes.outputs.changed_files }}\` |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Semantic release triggered. Check the release at https://github.com/ashcoft/tt-rss-feedly-theme/releases" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected. Release skipped." >> $GITHUB_STEP_SUMMARY
          fi
