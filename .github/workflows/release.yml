name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.2.3)'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Build CSS from LESS
        run: npm run build

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets

          # Copy theme files
          cp *.css release-assets/ 2>/dev/null || true
          cp -r feedly release-assets/ 2>/dev/null || true
          cp local-overrides.js release-assets/ 2>/dev/null || true
          cp -r tt-rss release-assets/ 2>/dev/null || true
          cp README.md CHANGELOG.md release-assets/ 2>/dev/null || true

          # Create versioned archives
          cd release-assets
          zip -r ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip .
          tar -czf ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Feedly Theme for Tiny Tiny RSS

            A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

            ### Installation
            1. Download and extract the zip or tar.gz
            2. Copy the contents to your tt-rss `themes/` directory
            3. Activate in tt-RSS preferences

            ### Changes
            See [CHANGELOG.md](https://github.com/ashcoft/tt-rss-feedly-theme/blob/main/CHANGELOG.md) for details.
          files: |
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag | ${{ steps.version.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release published: https://github.com/ashcoft/tt-rss-feedly-theme/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
