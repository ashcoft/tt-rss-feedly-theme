name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.semantic.outputs.tag }}
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Check for changes
        id: changes
        run: |
          # Compare HEAD with its parent to detect new commits
          if git diff --name-only HEAD~1 HEAD | grep -v "^tt-rss/" | grep -q .; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "changed_files=$(git diff --name-only HEAD~1 HEAD | grep -v '^tt-rss/' | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Build CSS from LESS
        if: steps.changes.outputs.has_changes == 'true'
        run: npm run build

      - name: Run Semantic Release
        if: steps.changes.outputs.has_changes == 'true'
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Run semantic-release directly from local node_modules
          result=$(./node_modules/.bin/semantic-release 2>&1) || true
          echo "$result"
          
          # Extract tag from output
          if echo "$result" | grep -q "Published release"; then
            tag=$(git describe --tags --abbrev=0)
            echo "tag=$tag" >> $GITHUB_OUTPUT
            echo "version=${tag#v}" >> $GITHUB_OUTPUT
          fi

      - name: Prepare Release Assets
        if: steps.semantic.outputs.tag
        run: |
          mkdir -p release-assets
          
          # Copy theme files
          cp *.css release-assets/ 2>/dev/null || true
          cp -r feedly release-assets/ 2>/dev/null || true
          cp local-overrides.js release-assets/ 2>/dev/null || true
          
          # Create zip archive
          cd release-assets
          zip -r ../release.zip .
          cd ..
          
          ls -la release.zip

      - name: Upload to GitHub Release
        if: steps.semantic.outputs.tag
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.semantic.outputs.tag }}
          name: Release ${{ steps.semantic.outputs.version }}
          body: |
            ## Feedly Theme for Tiny Tiny RSS

            A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

            ### Installation
            1. Download and extract the zip or tar.gz
            2. Copy the contents to your tt-rss `themes/` directory
            3. Activate in tt-RSS preferences

            ### Changes
            See [CHANGELOG.md](https://github.com/ashcoft/tt-rss-feedly-theme/blob/main/CHANGELOG.md) for details.
          files: |
            tt-rss-feedly-theme-${{ steps.semantic.outputs.version }}.zip
            tt-rss-feedly-theme-${{ steps.semantic.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Has Changes | ${{ steps.changes.outputs.has_changes }} |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "| Changed Files | \`${{ steps.changes.outputs.changed_files }}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Version | ${{ steps.semantic.outputs.version || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.semantic.outputs.tag }}" ]; then
            echo "✅ Release published: https://github.com/ashcoft/tt-rss-feedly-theme/releases/tag/${{ steps.semantic.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "ℹ️ Changes detected but no version bump (e.g., chore commits)." >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No changes detected. Release skipped." >> $GITHUB_STEP_SUMMARY
          fi
