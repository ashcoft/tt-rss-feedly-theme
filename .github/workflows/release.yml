name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Build CSS from LESS
        run: npm run build

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets
          cp *.css release-assets/ 2>/dev/null || true
          cp -r feedly release-assets/ 2>/dev/null || true
          cp local-overrides.js release-assets/ 2>/dev/null || true
          cp -r tt-rss release-assets/ 2>/dev/null || true
          cp README.md CHANGELOG.md release-assets/ 2>/dev/null || true
          cd release-assets
          zip -r ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip .
          tar -czf ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          draft: false
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Feedly Theme for Tiny Tiny RSS

            A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

            ### Installation
            1. Download and extract the zip or tar.gz
            2. Copy the contents to your tt-rss `themes/` directory
            3. Activate in tt-RSS preferences

            ### Changes
            See [CHANGELOG.md](https://github.com/ashcoft/tt-rss-feedly-theme/blob/main/CHANGELOG.md) for details.
          files: |
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release v${{ steps.version.outputs.version }} published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/ashcoft/tt-rss-feedly-theme/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
