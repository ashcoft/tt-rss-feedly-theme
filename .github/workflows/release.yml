name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.2.3)'
        required: true
      changelog:
        description: 'Changelog summary'
        required: false
        default: ''

jobs:
  create-release-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          # Remove 'v' prefix if present
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release Branch
        run: |
          BRANCH_NAME="release/v${{ steps.version.outputs.version }}"
          git checkout -b "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Push Release Branch
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: release/v${{ steps.version.outputs.version }}
          delete-branch: false
          title: Release v${{ steps.version.outputs.version }}
          body: |
            ## Release v${{ steps.version.outputs.version }}
            
            ### Changes
            ${{ github.event.inputs.changelog || '*No changelog provided*' }}
            
            ### Assets
            This PR creates release artifacts when merged:
            - tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip
            - tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz
          draft: false

      - name: Summary
        run: |
          echo "## Release PR Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | v${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Please review and merge the PR to publish the release." >> $GITHUB_STEP_SUMMARY

  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: recursive

      - name: Extract Version from PR Title
        id: version
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Sanitize PR title to prevent script injection
          # Only allow alphanumeric, dots, hyphens in version
          VERSION=$(echo "$PR_TITLE" | sed -n 's/.*Release v\([0-9.]*\).*/\1/p')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from PR title"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "24"
          cache: npm

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Build CSS from LESS
        run: npm run build

      - name: Prepare Release Assets
        run: |
          mkdir -p release-assets

          # Copy theme files
          cp *.css release-assets/ 2>/dev/null || true
          cp -r feedly release-assets/ 2>/dev/null || true
          cp local-overrides.js release-assets/ 2>/dev/null || true
          cp -r tt-rss release-assets/ 2>/dev/null || true
          cp README.md CHANGELOG.md release-assets/ 2>/dev/null || true

          # Create versioned archives
          cd release-assets
          zip -r ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip .
          tar -czf ../tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz .

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Feedly Theme for Tiny Tiny RSS

            A clean, minimalist Feedly-inspired theme for Tiny Tiny RSS.

            ### Installation
            1. Download and extract the zip or tar.gz
            2. Copy the contents to your tt-rss `themes/` directory
            3. Activate in tt-RSS preferences

            ### Changes
            See [CHANGELOG.md](https://github.com/ashcoft/tt-rss-feedly-theme/blob/main/CHANGELOG.md) for details.
          files: |
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.zip
            tt-rss-feedly-theme-${{ steps.version.outputs.version }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Release v${{ steps.version.outputs.version }} published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/ashcoft/tt-rss-feedly-theme/releases/tag/${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
